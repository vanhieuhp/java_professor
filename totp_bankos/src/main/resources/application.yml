spring:
  application:
    name: totp-bankos

  # ── DATABASE ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/bankos
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5          # minimum connections kept alive
      maximum-pool-size: 20    # max concurrent DB connections
      idle-timeout: 300000     # close idle connections after 5 min
      connection-timeout: 20000

  # ── JPA ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate       # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── FLYWAY ────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: public

  # ── REDIS ─────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 10
          max-active: 20

# ── JWT ─────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-change-in-production}
    access-token-expiry-ms: 3600000      # 1 hour
    refresh-token-expiry-ms: 604800000   # 7 days

  # ── RBAC ──────────────────────────────────────────────────────
  rbac:
    permission-cache-ttl-minutes: 15     # how long permissions cached in Redis
    session-timeout-minutes: 60          # active wallet session lifetime

# ── LOGGING ─────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    dev.hieunv.totp_bankos: DEBUG
    org.springframework.security: DEBUG   # set INFO in production
    org.hibernate.SQL: INFO