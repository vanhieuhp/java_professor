spring:
  application:
    name: bankos
  datasource:
    url: jdbc:postgresql://localhost:5432/bankos
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 5
      connection-timeout: 3000   # fail fast — 3 seconds timeout
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        cache:
          use_second_level_cache: false
          use_query_cache: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          lock:
            timeout: 5000  # wait max 5 seconds for a lock, then throw

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5s # local cache TTL

bankos:
  cache:
    exchange-rate:
      redis-ttl-seconds: 30      # Redis TTL — refresh from DB every 30s
      local-ttl-seconds: 5       # Local TTL — refresh from Redis every 5s

resilience4j:
  bulkhead:
    instances:
      paymentGateway:
        max-concurrent-calls: 5
        max-wait-duration: 0ms

  circuitbreaker:
    instances:
      paymentGateway:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2000ms
        sliding-window-size: 10
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3

  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.lang.RuntimeException
        ignore-exceptions:
          - dev.hieunv.bankos.exception.PaymentBusinessException

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: bankos-payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springfromwork.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.hieunv.bankos.*

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers
server:
  port: 8888
