spring:
  application:
    name: bankos
  datasource:
    url: jdbc:postgresql://localhost:5432/bankos
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 5
      connection-timeout: 3000   # fail fast — 3 seconds timeout
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        cache:
          use_second_level_cache: false
          use_query_cache: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          lock:
            timeout: 5000  # wait max 5 seconds for a lock, then throw

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5s # local cache TTL
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          paymentProcessed:dev.hieunv.bankos.dto.payment.PaymentProcessedEvent,
          orderCreated:dev.hieunv.bankos.dto.order.OrderCreatedEvent,
          paymentCompleted:dev.hieunv.bankos.dto.payment.PaymentCompletedEvent,
          paymentFailed:dev.hieunv.bankos.dto.payment.PaymentFailedEvent,
          walletStatus:dev.hieunv.bankos.dto.wallet.WalletStatusEvent
        linger.ms: 0          # send immediately — low latency for payments
        acks: all             # wait for all ISR replicas — durability
        retries: 3            # retry on transient broker failures
        batch-size: 16384     # 16KB default — fine for payment events
    consumer:
      group-id: bankos-payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "dev.hieunv.bankos.*"
        spring.json.type.mapping: >
          paymentProcessed:dev.hieunv.bankos.dto.payment.PaymentProcessedEvent,
          orderCreated:dev.hieunv.bankos.dto.order.OrderCreatedEvent,
          paymentCompleted:dev.hieunv.bankos.dto.payment.PaymentCompletedEvent,
          paymentFailed:dev.hieunv.bankos.dto.payment.PaymentFailedEvent,
          walletStatus:dev.hieunv.bankos.dto.wallet.WalletStatusEvent
    listener:
      ack-mode: RECORD # acknowledge each record after processing
    admin:
      auto-create: true
    streams:
      application-id: bankos-streams
      bootstrap-servers: ${spring.kafka.bootstrap-servers}
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.springframework.kafka.support.serializer.JsonSerializer
        spring.json.trusted.packages: "dev.hieunv.bankos.*"
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
      auto-startup: true

bankos:
  cache:
    exchange-rate:
      redis-ttl-seconds: 30      # Redis TTL — refresh from DB every 30s
      local-ttl-seconds: 5       # Local TTL — refresh from Redis every 5s

resilience4j:
  bulkhead:
    instances:
      paymentGateway:
        max-concurrent-calls: 5
        max-wait-duration: 0ms

  circuitbreaker:
    instances:
      paymentGateway:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2000ms
        sliding-window-size: 10
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3

  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.lang.RuntimeException
        ignore-exceptions:
          - dev.hieunv.bankos.exception.PaymentBusinessException

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers
server:
  port: 8888
