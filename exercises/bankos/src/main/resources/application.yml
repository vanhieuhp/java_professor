spring:
  application:
    name: bankos
  datasource:
    url: jdbc:postgresql://localhost:5432/bankos
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          lock:
            timeout: 5000  # wait max 5 seconds for a lock, then throw
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs