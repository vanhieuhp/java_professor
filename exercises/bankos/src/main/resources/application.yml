spring:
  application:
    name: bankos
  datasource:
    url: jdbc:postgresql://localhost:5432/bankos
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          lock:
            timeout: 5000  # wait max 5 seconds for a lock, then throw
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5s # local cache TTL

bankos:
  cache:
    exchange-rate:
      redis-ttl-seconds: 30      # Redis TTL — refresh from DB every 30s
      local-ttl-seconds: 5       # Local TTL — refresh from Redis every 5s