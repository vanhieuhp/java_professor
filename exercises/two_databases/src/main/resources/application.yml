spring:
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/bankos_primary
      username: admin
      password: password
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta:
        persistence:
          lock:
            timeout: 5000  # wait max 5 seconds for a lock, then throw
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true