
<style>
  .sim-root { padding: 1rem 0; font-family: var(--font-sans); }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .ctrl-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; }
  .ctrl-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .ctrl-row { display: flex; align-items: center; gap: 10px; }
  .ctrl-val { font-size: 14px; font-weight: 500; min-width: 36px; color: var(--color-text-primary); }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric-val.green { color: #1D9E75; }
  .metric-val.red { color: #E24B4A; }
  .chart-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 1rem; }
  .chart-wrap2 { position: relative; width: 100%; height: 180px; margin-bottom: 1rem; }
  .chart-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
  .btn-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  button { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-primary); }
  button:hover { background: var(--color-background-secondary); }
  button.active { background: #E6F1FB; color: #185FA5; border-color: #378ADD; }
  .log { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; max-height: 100px; overflow-y: auto; font-size: 11px; font-family: var(--font-mono); color: var(--color-text-secondary); }
</style>

<div class="sim-root">
  <div class="controls">
    <div class="ctrl-card">
      <div class="ctrl-label">Rate per second</div>
      <div class="ctrl-row">
        <input type="range" min="1" max="20" value="5" id="rate" step="1" style="flex:1">
        <span class="ctrl-val" id="rate-out">5</span>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="ctrl-label">Burst capacity</div>
      <div class="ctrl-row">
        <input type="range" min="1" max="30" value="10" id="burst" step="1" style="flex:1">
        <span class="ctrl-val" id="burst-out">10</span>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button id="btn-steady">Steady traffic</button>
    <button id="btn-burst">Burst traffic</button>
    <button id="btn-slow">Slow traffic</button>
    <button id="btn-spike">Spike test</button>
    <button id="btn-reset" style="margin-left:auto">Reset</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Tokens now</div><div class="metric-val" id="m-tokens">10.0</div></div>
    <div class="metric"><div class="metric-label">Accepted</div><div class="metric-val green" id="m-accept">0</div></div>
    <div class="metric"><div class="metric-label">Rejected</div><div class="metric-val red" id="m-reject">0</div></div>
    <div class="metric"><div class="metric-label">Accept rate</div><div class="metric-val" id="m-rate">—</div></div>
  </div>

  <div class="legend">
    <span><span class="leg-dot" style="background:#378ADD"></span>Token level</span>
    <span><span class="leg-dot" style="background:#B5D4F4"></span>Burst cap</span>
  </div>
  <div class="chart-title">Token level over time</div>
  <div class="chart-wrap"><canvas id="chart-tokens"></canvas></div>

  <div class="legend">
    <span><span class="leg-dot" style="background:#1D9E75"></span>Accepted</span>
    <span><span class="leg-dot" style="background:#E24B4A"></span>Rejected</span>
  </div>
  <div class="chart-title">Request outcomes per tick</div>
  <div class="chart-wrap2"><canvas id="chart-reqs"></canvas></div>

  <div class="chart-title">Event log</div>
  <div class="log" id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MAX_POINTS = 40;

let ratePerSecond = 5;
let burstCapacity = 10;
let tokens = burstCapacity;
let lastRefillMs = performance.now();
let accepted = 0;
let rejected = 0;
let simInterval = null;
let tickLabels = [];
let tokenHistory = [];
let acceptedHistory = [];
let rejectedHistory = [];
let tick = 0;
let requestPattern = null;

function refill() {
  const now = performance.now();
  const elapsed = (now - lastRefillMs) / 1000;
  const newTokens = elapsed * ratePerSecond;
  tokens = Math.min(burstCapacity, tokens + newTokens);
  lastRefillMs = now;
}

function tryAcquire(count = 1) {
  refill();
  const results = [];
  for (let i = 0; i < count; i++) {
    if (tokens >= 1) {
      tokens -= 1;
      accepted++;
      results.push(true);
    } else {
      rejected++;
      results.push(false);
    }
  }
  return results;
}

function pushData(acc, rej) {
  tick++;
  tickLabels.push(tick);
  tokenHistory.push(parseFloat(tokens.toFixed(2)));
  acceptedHistory.push(acc);
  rejectedHistory.push(rej);
  if (tickLabels.length > MAX_POINTS) {
    tickLabels.shift(); tokenHistory.shift();
    acceptedHistory.shift(); rejectedHistory.shift();
  }
  chartTokens.data.labels = tickLabels;
  chartTokens.data.datasets[0].data = tokenHistory;
  chartTokens.data.datasets[1].data = Array(tokenHistory.length).fill(burstCapacity);
  chartTokens.update('none');
  chartReqs.data.labels = tickLabels;
  chartReqs.data.datasets[0].data = acceptedHistory;
  chartReqs.data.datasets[1].data = rejectedHistory;
  chartReqs.update('none');
}

function updateMetrics() {
  document.getElementById('m-tokens').textContent = tokens.toFixed(1);
  document.getElementById('m-accept').textContent = accepted;
  document.getElementById('m-reject').textContent = rejected;
  const total = accepted + rejected;
  document.getElementById('m-rate').textContent = total > 0 ? (accepted / total * 100).toFixed(0) + '%' : '—';
}

function log(msg) {
  const el = document.getElementById('log');
  el.textContent = `[t=${tick}] ${msg}\n` + el.textContent;
}

function simTick() {
  let reqCount = 1;
  if (requestPattern === 'burst') {
    reqCount = tick % 6 === 0 ? 12 : 1;
  } else if (requestPattern === 'slow') {
    if (tick % 3 !== 0) { refill(); pushData(0, 0); updateMetrics(); return; }
  } else if (requestPattern === 'spike') {
    reqCount = (tick % 15 < 3) ? 8 : 1;
  } else {
    reqCount = Math.random() < 0.5 ? 2 : 1;
  }
  const results = tryAcquire(reqCount);
  const acc = results.filter(Boolean).length;
  const rej = results.length - acc;
  if (rej > 0) log(`${rej} rejected, ${acc} accepted (${tokens.toFixed(1)} tokens left)`);
  pushData(acc, rej);
  updateMetrics();
}

function startSim(pattern) {
  clearInterval(simInterval);
  requestPattern = pattern;
  simInterval = setInterval(simTick, 300);
  document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
}

function resetSim() {
  clearInterval(simInterval);
  simInterval = null;
  requestPattern = null;
  tokens = burstCapacity;
  lastRefillMs = performance.now();
  accepted = 0; rejected = 0; tick = 0;
  tickLabels = []; tokenHistory = []; acceptedHistory = []; rejectedHistory = [];
  chartTokens.data.labels = [];
  chartTokens.data.datasets[0].data = [];
  chartTokens.data.datasets[1].data = [];
  chartTokens.update('none');
  chartReqs.data.labels = [];
  chartReqs.data.datasets[0].data = [];
  chartReqs.data.datasets[1].data = [];
  chartReqs.update('none');
  updateMetrics();
  document.getElementById('log').textContent = '';
  document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
}

const chartTokens = new Chart(document.getElementById('chart-tokens'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Tokens', data: [], borderColor: '#378ADD', backgroundColor: 'rgba(55,138,221,0.08)', tension: 0.3, fill: true, pointRadius: 0, borderWidth: 2 },
      { label: 'Burst cap', data: [], borderColor: '#B5D4F4', borderDash: [4,4], pointRadius: 0, borderWidth: 1.5, fill: false }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#888', font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: 'rgba(128,128,128,0.1)' } },
      y: { min: 0, ticks: { color: '#888', font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.1)' } }
    },
    animation: false
  }
});

const chartReqs = new Chart(document.getElementById('chart-reqs'), {
  type: 'bar',
  data: {
    labels: [],
    datasets: [
      { label: 'Accepted', data: [], backgroundColor: '#5DCAA5', borderRadius: 3 },
      { label: 'Rejected', data: [], backgroundColor: '#F09595', borderRadius: 3 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { stacked: true, ticks: { color: '#888', font: { size: 10 }, maxTicksLimit: 10 }, grid: { display: false } },
      y: { stacked: true, ticks: { color: '#888', font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.1)' } }
    },
    animation: false
  }
});

document.getElementById('rate').addEventListener('input', e => {
  ratePerSecond = parseInt(e.target.value);
  document.getElementById('rate-out').textContent = ratePerSecond;
});
document.getElementById('burst').addEventListener('input', e => {
  burstCapacity = parseInt(e.target.value);
  tokens = Math.min(tokens, burstCapacity);
  document.getElementById('burst-out').textContent = burstCapacity;
  updateMetrics();
});

document.getElementById('btn-steady').addEventListener('click', function() {
  resetSim(); this.classList.add('active'); startSim('steady');
});
document.getElementById('btn-burst').addEventListener('click', function() {
  resetSim(); this.classList.add('active'); startSim('burst');
});
document.getElementById('btn-slow').addEventListener('click', function() {
  resetSim(); this.classList.add('active'); startSim('slow');
});
document.getElementById('btn-spike').addEventListener('click', function() {
  resetSim(); this.classList.add('active'); startSim('spike');
});
document.getElementById('btn-reset').addEventListener('click', resetSim);

updateMetrics();
</script>
